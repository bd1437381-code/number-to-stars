kind = "web"
previewPath = "/"
title = "محوّل الأرقام إلى نجوم"
version = "1.0.0"
id = "artifacts/number-to-stars"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18855

[services.development]
run = "pnpm --filter @workspace/number-to-stars run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/number-to-stars", "run", "build" ]
publicDir = "artifacts/number-to-stars/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18855"
BASE_PATH = "/"
